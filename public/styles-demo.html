<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scriptshort — Galerie de styles</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .gallery { max-width: 1000px; margin: 0 auto; padding: 30px 20px 60px; }
    .gallery h1 { text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 24px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 12px; text-align: center; }
    .card .name { font-weight: 700; margin: 0 0 10px; }
    .mini {
      position: relative; aspect-ratio: 9/16; border-radius: 10px; overflow: hidden; margin: 0 auto; max-width: 160px;
      background-color: #ced5e0;
      background-image:
        linear-gradient(45deg, #444c5e 25%, transparent 25%),
        linear-gradient(-45deg, #444c5e 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #444c5e 75%),
        linear-gradient(-45deg, transparent 75%, #444c5e 75%);
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
    }
  </style>
</head>
<body>
  <main class="gallery">
    <h1>🎨 Galerie de styles</h1>
    <p class="sub" style="text-align:center">Aperçu CSS des modèles (le même rendu apparaît en direct dans le studio).</p>
    <div class="grid" id="grid"></div>
  </main>

  <script>
    const HEAVY = ['Anton', 'Archivo Black', 'Bebas Neue', 'Luckiest Guy', 'Montserrat ExtraBold', 'Poppins', 'Inter', 'Inter Bold', 'Inter ExtraBold', 'Playfair Display', 'Arial Black', 'Impact'];
    const TEMPLATES = {
      hormozi: { label: 'Hormozi', mode: 'word', font: 'Montserrat ExtraBold', textColor: '#FFFFFF', highlightColor: '#FFE000', outlineColor: '#000000', posY: 33, animation: 'pop', uppercase: true, box: false, outlineScale: 1 },
      beast: { label: 'Beast', mode: 'word', font: 'Anton', textColor: '#FFFFFF', highlightColor: '#46FF45', outlineColor: '#000000', posY: 33, animation: 'pop', uppercase: true, box: false, outlineScale: 1 },
      bebas: { label: 'Bebas', mode: 'word', font: 'Bebas Neue', textColor: '#FFFFFF', highlightColor: '#FFD400', outlineColor: '#000000', posY: 14, animation: 'fade', uppercase: true, box: false, outlineScale: 0.9 },
      tiktok: { label: 'TikTok', mode: 'word', font: 'Poppins', textColor: '#FFFFFF', highlightColor: '#FF3B5C', outlineColor: '#000000', posY: 12, animation: 'bounce', uppercase: true, box: false, outlineScale: 1 },
      boxed: { label: 'Boxed', mode: 'word', font: 'Montserrat ExtraBold', textColor: '#FFFFFF', highlightColor: '#FFE000', outlineColor: '#000000', posY: 33, animation: 'pop', uppercase: true, box: true, outlineScale: 0.8 },
      neon: { label: 'Neon', mode: 'word', font: 'Archivo Black', textColor: '#13F0FF', highlightColor: '#FF35E0', outlineColor: '#04121A', posY: 33, animation: 'bounce', uppercase: true, box: false, outlineScale: 1.6 },
      fun: { label: 'Fun', mode: 'word', font: 'Luckiest Guy', textColor: '#FFFFFF', highlightColor: '#FF7A00', outlineColor: '#000000', posY: 33, animation: 'bounce', uppercase: true, box: false, outlineScale: 1 },
      inter: { label: 'Inter', mode: 'word', font: 'Inter Bold', textColor: '#FFFFFF', highlightColor: '#19E3B1', outlineColor: '#000000', posY: 33, animation: 'pop', uppercase: true, box: false, outlineScale: 0.9 },
      playfair: { label: 'Playfair', mode: 'word', font: 'Playfair Display', textColor: '#FFFFFF', highlightColor: '#E7C873', outlineColor: '#000000', posY: 14, animation: 'fade', uppercase: false, box: false, outlineScale: 0.8 },
      clean: { label: 'Clean', mode: 'word', font: 'Poppins', textColor: '#FFFFFF', highlightColor: '#FFD400', outlineColor: '#000000', posY: 10, animation: 'fade', uppercase: false, box: false, outlineScale: 0.6 },
      subtitle: { label: 'Classique', mode: 'segment', font: 'Arial', textColor: '#FFFFFF', highlightColor: '#FFFFFF', outlineColor: '#000000', posY: 8, animation: 'fade', uppercase: false, box: false, outlineScale: 0.7 },
    };
    const SAMPLE = ['ALORS', 'ON', 'TESTE', 'LE', 'STYLE'];

    function outlineShadow(px, color) {
      const pts = [];
      for (let i = 0; i < 12; i++) { const a = Math.PI * 2 / 12 * i; pts.push(`${(Math.cos(a)*px).toFixed(1)}px ${(Math.sin(a)*px).toFixed(1)}px 0 ${color}`); }
      return pts.join(', ');
    }

    function makeCard(key) {
      const t = TEMPLATES[key];
      const card = document.createElement('div'); card.className = 'card';
      card.innerHTML = `<p class="name">${t.label}</p>`;
      const mini = document.createElement('div'); mini.className = 'mini';
      const line = document.createElement('div'); line.className = 'live-caption';
      const inner = document.createElement('span'); inner.className = 'lp-inner';
      line.appendChild(inner); mini.appendChild(line); card.appendChild(mini);

      const frameW = 160, isWord = t.mode === 'word';
      const fontPx = Math.max(11, frameW * (isWord ? 0.072 : 0.05));
      inner.style.fontFamily = `"${t.font}", sans-serif`;
      inner.style.fontSize = fontPx + 'px';
      inner.style.fontWeight = HEAVY.includes(t.font) ? '400' : (isWord ? '800' : '400');
      inner.style.textTransform = t.uppercase ? 'uppercase' : 'none';
      if (t.box) {
        inner.style.background = 'rgba(0,0,0,0.62)';
        inner.style.padding = `${fontPx*0.10}px ${fontPx*0.32}px`;
        inner.style.borderRadius = `${fontPx*0.16}px`;
      } else {
        inner.style.textShadow = outlineShadow(Math.max(1, frameW*0.009*t.outlineScale*(isWord?1:0.7)), t.outlineColor || '#000');
      }
      line.style.setProperty('--lp-txt', t.textColor);
      line.style.setProperty('--lp-hl', t.highlightColor);
      line.style.bottom = (4 + (t.posY / 100) * 80).toFixed(1) + '%';

      const active = isWord ? 2 : -1;
      inner.innerHTML = SAMPLE.map((w, i) => `<span class="lp-w ${i===active?'on':''}">${w}</span>`).join(' ');
      inner.style.animation = ({ fade: 'lpFade 1.6s ease infinite', pop: 'lpPop 1.6s ease infinite', bounce: 'lpBounce 1.6s ease infinite', none: 'none' })[t.animation];
      return card;
    }

    const grid = document.getElementById('grid');
    Object.keys(TEMPLATES).forEach((k) => grid.appendChild(makeCard(k)));
  </script>
</body>
</html>
